name: Backend CI

on:
  pull_request:
    branches: [main, development]

jobs:
  build-test-lint:
    name: Build · Test · Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend.Tests/backend.Tests.csproj

      # `TreatWarningsAsErrors=true` in Directory.Build.props means any StyleCop
      # or Roslyn analyzer violation fails this step. No extra flags needed.
      - name: Build
        run: dotnet build backend.Tests/backend.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test backend.Tests/backend.Tests.csproj --no-build --configuration Release --verbosity normal

      # Whitespace / formatting check. Run for both the app and the test project
      # so staged changes in either are verified.
      - name: Lint (format check)
        run: |
          dotnet format backend/backend.csproj --verify-no-changes --no-restore
          dotnet format backend.Tests/backend.Tests.csproj --verify-no-changes --no-restore
