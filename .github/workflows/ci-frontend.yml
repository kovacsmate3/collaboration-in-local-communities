name: Frontend CI

on:
  pull_request:
    branches: [main, development]

jobs:
  lint-build:
    name: Lint · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      # `npm run lint` runs `eslint --max-warnings=0` (see frontend/package.json),
      # so any warning fails this step.
      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Start server
        run: npm start &

      - name: Wait for server
        run: timeout 30 sh -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 1; done'

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --crawl
            --no-progress
            http://localhost:3000
          fail: true
